<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p>Controls:</p>
            <ul>
                <li>Mouse: Move left paddle</li>
                <li>Arrow Keys (↑/↓): Move left paddle</li>
                <li>Computer controls right paddle automatically</li>
            </ul>
        </div>
        
        <div class="status" id="status">Game Started!</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
